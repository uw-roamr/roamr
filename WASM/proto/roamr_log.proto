syntax = "proto3";

package roamr.log;
option optimize_for = LITE_RUNTIME;

enum PoseSource {
  POSE_SOURCE_UNSPECIFIED = 0;
  POSE_SOURCE_IMU = 1;
  POSE_SOURCE_WHEEL_ODOMETRY = 2;
  POSE_SOURCE_FUSED_IMU_WHEEL_ODOMETRY = 3;
}

message LidarCameraData {
  uint64 sequence = 1;
  double timestamp = 2;

  uint32 points_frame_id = 3;
  uint32 image_frame_id = 4;
  uint32 point_count = 5;

  repeated float points_xyz = 6;
  bytes colors_rgb = 7;

  uint32 image_width = 8;
  uint32 image_height = 9;
  uint32 image_channels = 10;
  bytes image = 11;

  double matched_pose_timestamp = 12;
}

message IMUData {
  uint64 sequence = 1;
  double timestamp = 2;
  uint32 frame_id = 3;

  double acc_x = 4;
  double acc_y = 5;
  double acc_z = 6;

  double gyro_x = 7;
  double gyro_y = 8;
  double gyro_z = 9;
}

message PoseData {
  uint64 sequence = 1;
  double timestamp = 2;
  PoseSource source = 3;

  double tx = 4;
  double ty = 5;
  double tz = 6;

  double qx = 7;
  double qy = 8;
  double qz = 9;
  double qw = 10;
}
